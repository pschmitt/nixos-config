# Generated by declaroid generate-config from R6AIB700W850L7G
# App names were read from each APK (aapt2); rename any that came out
# wrong or unhelpful.
# store is detected from the installer attribution (pm list packages -i):
#   com.android.vending -> gplay, org.fdroid.fdroid -> fdroid, Obtainium -> github.
# A few well-known packages (the F-Droid and Obtainium clients themselves) get
# a concrete, working store/url or store/repo/asset regardless of installer,
# since their real source is always the same no matter how they got here.
# The top-level default below covers the common case (gplay); only apps that
# differ from it get their own store: line.
# profiles: gives each detected Android user/profile a short name (the
# auto-detected current one is always "main"); apps get a profile: <name> only
# if installed somewhere other than just that current profile -- "all" if
# installed for every profile found, or a specific profile name if installed
# for exactly one other one. profile: also accepts a bare id or "all"/"current"
# directly, with no need for a profiles: entry to back it.
# Entries marked with a "# TODO" are commented out: reinstalling from this
# config as-is would fail for them (store could not be determined, or a
# github repo/asset could not be recovered) -- fix them up and uncomment.
device: EU_AI2302 # R6AIB700W850L7G
imports:
  - imports/base.yaml
  - imports/apps.yaml
  - imports/banking.yaml
  - imports/google.yaml
  - imports/obtainium.yaml
profiles:
  - name: main
    id: 0
  - name: island
    id: 10
root:
  enabled: false
apps:
  # Banking & Finance -- overrides opting out of a few imports/banking.yaml
  # entries not wanted on this device (relies on declaroid's apps:
  # dedup-by-pkg, last-entry-wins).
  - name: "Curve Pay"
    pkg: com.imaginecurve.curve.prd
    state:
      installed: false

  - name: "PayPal"
    pkg: com.paypal.android.p2pmobile
    state:
      installed: false

  - name: "Trade Republic"
    pkg: de.traderepublic.app
    state:
      installed: false

  # Chat & Messaging
  - name: "com.microsoft.office.outlook"
    pkg: com.microsoft.office.outlook
    profile: island

  - name: "Signal"
    pkg: org.thoughtcrime.securesms

  - name: "WhatsApp"
    pkg: com.whatsapp

  # Development
  - name: "Syncthing-Fork"
    pkg: com.github.catfriend1.syncthingfork
    store: fdroid

  # TODO: store unknown (installer=com.google.android.packageinstaller) -- set store by hand
  # - name: "Termux:Float"
  #   pkg: com.termux.window

  - name: "Termux:Tasker"
    pkg: com.termux.tasker
    store: fdroid

  # Insurance & Health
  - name: "TK"
    pkg: de.tk.tkapp

  - name: "TK-Ident"
    pkg: de.tk.apps.android.tkident

  # Media
  - name: "Photos"
    pkg: com.google.android.apps.photos

  # Productivity
  - name: "Nextcloud"
    pkg: com.nextcloud.client

  - name: "ScanSnap Cloud"
    pkg: com.fujitsu.pfu.scansnapcloudeu

  - name: "Tasker"
    pkg: net.dinglisch.android.taskerm

  # Security
  - name: "Authy"
    pkg: com.authy.authy

  - name: "Duo Mobile"
    pkg: com.duosecurity.duomobile

  - name: "LuxTrust Mobile"
    pkg: com.LuxTrustMobile

  # System
  - name: "Clock"
    pkg: com.google.android.deskclock

  - name: "Contacts"
    pkg: com.google.android.contacts

  - name: "hyperion"
    pkg: projekt.launcher

  - name: "hyperion dock"
    pkg: projekt.hyperion.dock
    store: url
    # FIXME This isn't a valid URL. The APK is hosted on apkmirror.com
    url: "https://prjkt.io/dock"

  - name: "Island"
    pkg: com.oasisfeng.island
    profile: all

  - name: "NetBird"
