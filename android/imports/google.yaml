# Google's own bundled/first-party apps, shared across every device via
# `imports:` -- consolidates what used to be split between
# imports/apps.yaml (Gmail/Gboard/Maps, already identically present on
# every device) and each device's own scattered per-app entries
# (Contacts/Phone/Calendar/Clock/Photos/Drive/YouTube/Messages/Camera/
# Files by Google). A device that wants a different convergence state for
# one of these (e.g. px5's Camera, installed but disabled) overrides it
# with its own apps: entry for the same pkg (apps: dedup-by-pkg, last
# entry wins).
apps:
  - name: "Camera"
    pkg: com.google.android.GoogleCamera
    state:
      installed: false

  - name: "Calendar"
    pkg: com.google.android.calendar

  - name: "Clock"
    pkg: com.google.android.deskclock

  # A pre-existing AOSP system app on some devices (not something declaroid
  # ever installed) -- kept installed but disabled in favor of Google's
  # Clock above, since it's a different pkg and can't be uninstalled.
  - name: "Clock (AOSP)"
    pkg: com.android.deskclock
    state:
      installed: true
      disabled: true

  - name: "Contacts"
    pkg: com.google.android.contacts

  - name: "Drive"
    pkg: com.google.android.apps.docs

  - name: "Files by Google"
    pkg: com.google.android.apps.nbu.files
    state:
      installed: false

  - name: "Gboard"
    pkg: com.google.android.inputmethod.latin

  - name: "Gmail"
    pkg: com.google.android.gm

  - name: "Maps"
    pkg: com.google.android.apps.maps

  - name: "Messages"
    pkg: com.google.android.apps.messaging

  - name: "Phone"
    pkg: com.google.android.dialer

  - name: "Photos"
    pkg: com.google.android.apps.photos

  - name: "YouTube"
    pkg: com.google.android.youtube
