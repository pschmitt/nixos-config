# Media/streaming apps, imported by mp4 and px5 -- not zf10, no request
# to give it this set yet, rather than assuming every device wants the
# same media apps.
apps:
  - name: "ARD Mediathek"
    pkg: de.swr.avp.ard

  # Only wanted by mp4.
  - name: "ARTE"
    pkg: tv.arte.plus7
    if:
      ro.product.device: clover

  - name: "Findroid+"
    pkg: dev.pschmitt.findroidplus
    store: github
    repo: "pschmitt/findroidplus"

  - name: "Netflix"
    pkg: com.netflix.mediaclient

  - name: "Pocket Casts"
    pkg: au.com.shiftyjelly.pocketcasts

  - name: "ZDF"
    pkg: com.zdf.android.mediathek
