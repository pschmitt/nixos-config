# Productivity apps, shared across every device that imports this -- a
# device that doesn't want a specific entry excludes itself via if:,
# same pattern as imports/banking.yaml.
apps:
  # Only wanted by px5.
  - name: "Obsidian"
    pkg: md.obsidian
    if:
      ro.product.device: redfin

  # Only wanted by px5.
  - name: "Todoist"
    pkg: com.todoist
    if:
      ro.product.device: redfin

  # Wanted by px5 (redfin) and zf10 (ASUS_AI2302), not mp4 (clover).
  - name: "Syncthing-Fork"
    pkg: com.github.catfriend1.syncthingfork
    store: fdroid
    if:
      not:
        ro.product.device: clover
