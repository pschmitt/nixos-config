# Banking/finance apps, shared across every device that imports this --
# the union of what px5 and zf10 each had device-locally before. Unlike
# imports/media.yaml, this one *is* shared as one list across both
# devices: a device that doesn't want a specific entry excludes itself via
# if: (zf10, codename ASUS_AI2302, for Curve Pay/PayPal/Trade Republic)
# rather than this file staying device-exclusive.
apps:
  - name: "BoursoBank"
    pkg: com.boursorama.android.clients

  - name: "bunq"
    pkg: com.bunq.android

  - name: "Coinbase"
    pkg: com.coinbase.android

  - name: "Curve Pay"
    pkg: com.imaginecurve.curve.prd
    if:
      not:
        ro.product.device: ASUS_AI2302

  - name: "eboo"
    pkg: lu.post.finance.mobile.eboo
    state: {installed: false}

  - name: "Google Wallet"
    pkg: com.google.android.apps.walletnfcrel

  - name: "ING"
    pkg: de.ingdiba.bankingapp

  - name: "Mes Comptes - LCL"
    pkg: fr.lcl.android.customerarea

  - name: "norisbank"
    pkg: com.db.mm.norisbank

  - name: "PayPal"
    pkg: com.paypal.android.p2pmobile
    if:
      not:
        ro.product.device: ASUS_AI2302

  - name: "Trade Republic"
    pkg: de.traderepublic.app
    if:
      not:
        ro.product.device: ASUS_AI2302
