# Shopping apps, shared across every device that imports this -- the
# union of what px5/mp4 each had device-locally before. A device that
# doesn't want a specific entry excludes itself via if:, same pattern as
# imports/banking.yaml.
apps:
  # Wanted by px5 (redfin) and mp4 (clover), not zf10 (ASUS_AI2302).
  - name: "Amazon Shopping"
    pkg: com.amazon.mShop.android.shopping
    if:
      not:
        ro.product.device: ASUS_AI2302

  # Only wanted by px5.
  - name: "Edeka"
    pkg: de.edeka.genuss
    if:
      ro.product.device: redfin

  # Only wanted by px5.
  - name: "Wolt"
    pkg: com.wolt.android
    if:
      ro.product.device: redfin
