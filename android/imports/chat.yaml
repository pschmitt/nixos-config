# Chat/messaging apps, shared across every device that imports this -- the
# union of what px5/mp4/zf10 each had device-locally before. A device that
# doesn't want a specific entry overrides it with its own
# `state: {installed: false}` apps: entry for the same pkg (declaroid's
# apps: merge dedups by pkg, last entry wins), same pattern as
# imports/banking.yaml.
apps:
  - name: "Element X"
    pkg: io.element.android.x

  - name: "Signal"
    pkg: org.thoughtcrime.securesms

  - name: "WhatsApp Messenger"
    pkg: com.whatsapp
