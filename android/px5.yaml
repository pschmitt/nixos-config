# Generated by declaroid generate-config from 10.5.0.110:39531
# App names were read from each APK (aapt2); rename any that came out
# wrong or unhelpful.
# store is detected from the installer attribution (pm list packages -i):
#   com.android.vending -> gplay, org.fdroid.fdroid -> fdroid, Obtainium -> github.
# A few well-known packages (the F-Droid and Obtainium clients themselves) get
# a concrete, working store/url or store/repo/asset regardless of installer,
# since their real source is always the same no matter how they got here.
# The top-level default below covers the common case (gplay); only apps that
# differ from it get their own store: line.
# profiles: gives each detected Android user/profile a short name (the
# auto-detected current one is always "main"); apps get a profile: <name> only
# if installed somewhere other than just that current profile -- "all" if
# installed for every profile found, or a specific profile name if installed
# for exactly one other one. profile: also accepts a bare id or "all"/"current"
# directly, with no need for a profiles: entry to back it.
# Entries marked with a "# TODO" are commented out: reinstalling from this
# config as-is would fail for them (store could not be determined, or a
# github repo/asset could not be recovered) -- fix them up and uncomment.
device: redfin
imports:
  - imports/base.yaml
  - imports/apps.yaml
  - imports/ai.yaml
  - imports/banking.yaml
  - imports/chat.yaml
  - imports/google.yaml
  - imports/media.yaml
  - imports/termux.yaml
  - imports/modules.yaml
  - imports/root.yaml
  - imports/obtainium.yaml
adb:
  start_cmd: "zhj adb::connect px5.lan"
profiles:
  - name: main
    id: 0
root:
  enabled: true
  framework: apatch
apps:
  # Chat & Messaging
  - name: "Reddit"
    pkg: com.reddit.frontpage

  # Development
  - name: "GitHub"
    pkg: com.github.android

  - name: "RustDesk"
    pkg: com.carriez.flutter_hbb
    store: fdroid

  - name: "Syncthing-Fork"
    pkg: com.github.catfriend1.syncthingfork
    store: fdroid

  # Home Automation
  - name: "Gadgetbridge (Nightly)"
    pkg: nodomain.freeyourgadget.gadgetbridge.nightly
    store: github
    repo: "pschmitt/Gadgetbridge"

  - name: "Shelly Smart Control"
    pkg: cloud.shelly.smartcontrol

  # Navigation & Travel
  - name: "DB Navigator"
    pkg: de.hafas.android.db

  - name: "OSM Dashboard"
    pkg: de.storchp.opentracks.osmplugin
    store: fdroid

  # Productivity
  - name: "Nextcloud"
    pkg: com.nextcloud.client

  - name: "Obsidian"
    pkg: md.obsidian

  - name: "Tasker"
    pkg: net.dinglisch.android.taskerm

  - name: "Todoist"
    pkg: com.todoist

  # Security
  - name: "APatch"
    pkg: me.bmax.apatch
    store: fdroid

  # Shopping
  - name: "Amazon Shopping"
    pkg: com.amazon.mShop.android.shopping

  - name: "Edeka"
    pkg: de.edeka.genuss

  - name: "Wolt"
    pkg: com.wolt.android

  # System -- Camera overrides imports/google.yaml's plain entry (apps:
  # dedup-by-pkg, last wins) to opt px5 out of it entirely. Clock (AOSP)
  # is now handled by imports/google.yaml (same pkg, shared convergence).
  - name: "Camera"
    pkg: com.google.android.GoogleCamera
    state:
      installed: false

  - name: "Smartspacer"
    pkg: com.kieronquinn.app.smartspacer
    store: github
    repo: "KieronQuinn/Smartspacer"

  # Weather
  - name: "Breezy Weather"
    pkg: org.breezyweather
    store: github
    repo: "breezy-weather/breezy-weather"
